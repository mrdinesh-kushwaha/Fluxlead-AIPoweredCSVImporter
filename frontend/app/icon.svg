<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowGradient" x1="4" y1="2" x2="60" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6D5EF5"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="sparkleGradient" x1="20" y1="16" x2="44" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#3B1E7A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square brand background, transparent outside this shape -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#flowGradient)"/>

  <!-- subtle inner glow ring for depth -->
  <rect x="3" y="3" width="58" height="58" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Main sparkle -->
  <g filter="url(#softShadow)">
    <path
      d="M32 12
         L35.2 25.3
         C35.8 27.7 37.7 29.6 40.1 30.2
         L52 33
         L40.1 35.8
         C37.7 36.4 35.8 38.3 35.2 40.7
         L32 54
         L28.8 40.7
         C28.2 38.3 26.3 36.4 23.9 35.8
         L12 33
         L23.9 30.2
         C26.3 29.6 28.2 27.7 28.8 25.3
         Z"
      fill="url(#sparkleGradient)"
    />
  </g>

  <!-- small accent sparkle, top-right, premium touch -->
  <path
    d="M47 12 L48.3 16.7 L53 18 L48.3 19.3 L47 24 L45.7 19.3 L41 18 L45.7 16.7 Z"
    fill="#FFFFFF"
    fill-opacity="0.85"
  />
</svg>
